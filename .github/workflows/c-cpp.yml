name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache C++ packages
        uses: actions/cache@v4
        with:
          path: build/packages
          key: cache-cpp-all
          restore-keys: cache-cpp-all

      - name: CMake workflow
        run: cmake --workflow --preset windows-x86-release
